<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Antibody Dilution Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      padding: 24px 16px 160px;
      -webkit-text-size-adjust: 100%;
    }

    .container { max-width: 520px; margin: 0 auto; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }

    .subtitle { color: #64748b; font-size: 0.875rem; margin-bottom: 24px; }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #64748b; margin-bottom: 12px;
    }

    .mode-tabs { display: flex; flex-direction: column; gap: 8px; }

    .mode-tab {
      padding: 10px 14px; border-radius: 8px;
      border: 1.5px solid #e2e8f0; background: transparent;
      text-align: left; font-size: 0.875rem; color: #1e293b;
      -webkit-appearance: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-tab.active {
      border-color: #2563eb; background: #dbeafe;
      color: #2563eb; font-weight: 600;
    }

    .tab-desc { font-size: 0.75rem; color: #64748b; margin-top: 2px; font-weight: 400; }
    .mode-tab.active .tab-desc { color: #1d4ed8; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 5px; color: #64748b; }
    .field-row { display: flex; gap: 8px; }

    .field-row input, .field-row select, .text-input {
      padding: 10px 12px; border-radius: 8px;
      border: 1.5px solid #e2e8f0; font-size: 16px;
      font-family: inherit; color: #1e293b; background: #fff;
      -webkit-appearance: none; appearance: none;
    }

    .field-row input, .text-input { flex: 1; }
    .field-row select { flex: 0 0 80px; }

    .field-row input:focus, .field-row select:focus, .text-input:focus {
      outline: none; border-color: #2563eb;
    }

    .ratio-wrap { display: flex; align-items: center; gap: 8px; }
    .ratio-wrap .prefix { font-size: 1rem; font-weight: 600; color: #64748b; white-space: nowrap; }

    .calc-btn {
      display: block; width: 100%; padding: 14px;
      background: #2563eb; color: #fff;
      font-size: 17px; font-weight: 600;
      border: none; border-radius: 10px;
      font-family: inherit;
      -webkit-appearance: none; appearance: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      cursor: pointer;
    }

    .calc-btn:active { background: #1e40af; }

    .error-msg {
      color: #dc2626; font-size: 0.875rem; margin-top: 10px;
      padding: 10px 14px; background: #fef2f2;
      border-radius: 8px; border: 1px solid #fecaca;
    }

    .hidden { display: none !important; }

    .results {
      background: #f0f9ff; border: 1.5px solid #bae6fd;
      border-radius: 12px; padding: 20px; margin-top: 16px;
    }

    .results-title {
      font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #64748b; margin-bottom: 14px;
    }

    .ratio-display { font-size: 2rem; font-weight: 700; color: #2563eb; margin-bottom: 16px; }
    .ratio-label { font-size: 1rem; color: #64748b; font-weight: 500; }

    .section-label {
      font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: #64748b; margin: 14px 0 8px;
    }

    .result-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #e2e8f0; font-size: 0.9375rem;
    }

    .result-row:last-child { border-bottom: none; }
    .result-row .val { font-weight: 700; color: #2563eb; }

    .divider { height: 1px; background: #e2e8f0; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Antibody Dilution Calculator</h1>
    <p class="subtitle">Calculate volumes for antibody staining</p>

    <div class="card">
      <div class="card-title">What do you know?</div>
      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-totalRatio" onclick="setMode('totalRatio')">
          Total Volume + Dilution Ratio
          <div class="tab-desc">e.g. 1 mL at 1:1000 — how much antibody?</div>
        </button>
        <button class="mode-tab" id="tab-antibodyRatio" onclick="setMode('antibodyRatio')">
          Antibody Volume + Dilution Ratio
          <div class="tab-desc">e.g. 2 µL antibody at 1:500 — what total?</div>
        </button>
        <button class="mode-tab" id="tab-totalAntibody" onclick="setMode('totalAntibody')">
          Total Volume + Antibody Volume
          <div class="tab-desc">e.g. 5 µL in 1 mL — what dilution?</div>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Inputs</div>

      <div class="field" id="field-total">
        <label>Total Volume (per sample)</label>
        <div class="field-row">
          <input type="text" inputmode="decimal" id="totalVolume" placeholder="e.g. 1" />
          <select id="totalUnit">
            <option value="uL">µL</option>
            <option value="mL" selected>mL</option>
            <option value="L">L</option>
          </select>
        </div>
      </div>

      <div class="field hidden" id="field-antibody">
        <label>Antibody Volume (per sample)</label>
        <div class="field-row">
          <input type="text" inputmode="decimal" id="antibodyVolume" placeholder="e.g. 1" />
          <select id="antibodyUnit">
            <option value="uL" selected>µL</option>
            <option value="mL">mL</option>
            <option value="L">L</option>
          </select>
        </div>
      </div>

      <div class="field" id="field-ratio">
        <label>Dilution Ratio (1 : X)</label>
        <div class="ratio-wrap">
          <span class="prefix">1 :</span>
          <input type="text" inputmode="decimal" id="dilutionRatio" placeholder="e.g. 1000" />
        </div>
      </div>

      <div class="field">
        <label>Number of Samples</label>
        <input type="text" inputmode="numeric" id="numSamples" value="1" class="text-input" style="max-width:120px" />
      </div>

      <button class="calc-btn" onclick="doCalc()">Calculate</button>

      <div id="errorBox" class="error-msg hidden"></div>
    </div>

    <div id="resultsBox" class="results hidden">
      <div class="results-title">Results</div>
      <div id="ratioLine" class="ratio-display"></div>
      <div id="resultsBody"></div>
    </div>
  </div>

  <script>
    var currentMode = 'totalRatio';

    function setMode(m) {
      currentMode = m;
      // Update tabs
      document.getElementById('tab-totalRatio').className = (m === 'totalRatio') ? 'mode-tab active' : 'mode-tab';
      document.getElementById('tab-antibodyRatio').className = (m === 'antibodyRatio') ? 'mode-tab active' : 'mode-tab';
      document.getElementById('tab-totalAntibody').className = (m === 'totalAntibody') ? 'mode-tab active' : 'mode-tab';
      // Show/hide fields
      var showTotal = (m === 'totalRatio' || m === 'totalAntibody');
      var showAb = (m === 'antibodyRatio' || m === 'totalAntibody');
      var showRatio = (m === 'totalRatio' || m === 'antibodyRatio');
      document.getElementById('field-total').className = showTotal ? 'field' : 'field hidden';
      document.getElementById('field-antibody').className = showAb ? 'field' : 'field hidden';
      document.getElementById('field-ratio').className = showRatio ? 'field' : 'field hidden';
      // Hide results
      document.getElementById('resultsBox').className = 'results hidden';
      document.getElementById('errorBox').className = 'error-msg hidden';
    }

    function toUL(val, unit) {
      if (unit === 'mL') return val * 1000;
      if (unit === 'L') return val * 1000000;
      return val;
    }

    function fmtNum(n) {
      return parseFloat(n.toPrecision(4)).toString();
    }

    function fmtVol(ul) {
      if (ul >= 1000000) return fmtNum(ul / 1000000) + ' L';
      if (ul >= 1000) return fmtNum(ul / 1000) + ' mL';
      return fmtNum(ul) + ' \u00B5L';
    }

    function getVal(id) {
      var el = document.getElementById(id);
      if (!el) return NaN;
      var s = (el.value || '').replace(/[^0-9.\-]/g, '');
      if (s === '') return NaN;
      return Number(s);
    }

    function doCalc() {
      // Dismiss keyboard
      if (document.activeElement) { document.activeElement.blur(); }

      // Small delay for iOS keyboard dismiss
      setTimeout(runCalc, 120);
    }

    function runCalc() {
      // Hide previous
      document.getElementById('resultsBox').className = 'results hidden';
      document.getElementById('errorBox').className = 'error-msg hidden';

      var samples = parseInt(document.getElementById('numSamples').value, 10);
      if (isNaN(samples) || samples < 1) samples = 1;

      var abPerSample, totalPerSample, diluentPerSample, ratio;

      if (currentMode === 'totalRatio') {
        var tv = getVal('totalVolume');
        var dr = getVal('dilutionRatio');
        var tvu = document.getElementById('totalUnit').value;
        if (isNaN(tv) || tv <= 0) { showErr('Enter a valid total volume.'); return; }
        if (isNaN(dr) || dr <= 0) { showErr('Enter a valid dilution ratio.'); return; }
        totalPerSample = toUL(tv, tvu);
        ratio = dr;
        abPerSample = totalPerSample / ratio;
        diluentPerSample = totalPerSample - abPerSample;

      } else if (currentMode === 'antibodyRatio') {
        var av = getVal('antibodyVolume');
        var dr2 = getVal('dilutionRatio');
        var avu = document.getElementById('antibodyUnit').value;
        if (isNaN(av) || av <= 0) { showErr('Enter a valid antibody volume.'); return; }
        if (isNaN(dr2) || dr2 <= 0) { showErr('Enter a valid dilution ratio.'); return; }
        abPerSample = toUL(av, avu);
        ratio = dr2;
        totalPerSample = abPerSample * ratio;
        diluentPerSample = totalPerSample - abPerSample;

      } else {
        var tv2 = getVal('totalVolume');
        var av2 = getVal('antibodyVolume');
        var tvu2 = document.getElementById('totalUnit').value;
        var avu2 = document.getElementById('antibodyUnit').value;
        if (isNaN(tv2) || tv2 <= 0) { showErr('Enter a valid total volume.'); return; }
        if (isNaN(av2) || av2 <= 0) { showErr('Enter a valid antibody volume.'); return; }
        totalPerSample = toUL(tv2, tvu2);
        abPerSample = toUL(av2, avu2);
        if (abPerSample >= totalPerSample) { showErr('Antibody volume must be less than total volume.'); return; }
        ratio = totalPerSample / abPerSample;
        diluentPerSample = totalPerSample - abPerSample;
      }

      // Build results HTML
      var ratioText = '<span class="ratio-label">Dilution ratio</span><br>1 : ' + fmtNum(ratio);
      document.getElementById('ratioLine').innerHTML = ratioText;

      var h = '';
      if (samples > 1) {
        h += '<div class="section-label">Per Sample</div>';
        h += makeRow('Antibody', abPerSample);
        h += makeRow('Diluent / Buffer', diluentPerSample);
        h += makeRow('Total', totalPerSample);
        h += '<div class="divider"></div>';
        h += '<div class="section-label">All ' + samples + ' Samples Combined</div>';
        h += makeRow('Antibody', abPerSample * samples);
        h += makeRow('Diluent / Buffer', diluentPerSample * samples);
        h += makeRow('Total', totalPerSample * samples);
      } else {
        h += makeRow('Antibody Volume', abPerSample);
        h += makeRow('Diluent / Buffer Volume', diluentPerSample);
        h += makeRow('Total Volume', totalPerSample);
      }

      document.getElementById('resultsBody').innerHTML = h;
      document.getElementById('resultsBox').className = 'results';

      // Scroll to results after iOS reflow
      setTimeout(function() {
        document.getElementById('resultsBox').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 150);
    }

    function makeRow(label, ul) {
      return '<div class="result-row"><span>' + label + '</span><span class="val">' + fmtVol(ul) + '</span></div>';
    }

    function showErr(msg) {
      var el = document.getElementById('errorBox');
      el.textContent = msg;
      el.className = 'error-msg';
    }
  </script>
</body>
</html>
