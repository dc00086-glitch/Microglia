<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antibody Dilution Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563eb;
      --blue-light: #dbeafe;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --error: #dc2626;
      --success-bg: #f0f9ff;
      --success-border: #bae6fd;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 120px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mode-tab {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: transparent;
      text-align: left;
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--text);
      transition: all 0.15s;
    }

    .mode-tab:hover {
      border-color: var(--blue);
      background: var(--blue-light);
    }

    .mode-tab.active {
      border-color: var(--blue);
      background: var(--blue-light);
      color: var(--blue);
      font-weight: 600;
    }

    .mode-tab .tab-desc {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 400;
    }

    .mode-tab.active .tab-desc {
      color: #1d4ed8;
    }

    /* Fields */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 5px;
      color: var(--muted);
    }

    .field-row {
      display: flex;
      gap: 8px;
    }

    .field-row input,
    .field-row select,
    input[type="number"],
    input[type="text"] {
      flex: 1;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--blue);
    }

    .field-row select {
      flex: 0 0 80px;
      cursor: pointer;
    }

    /* Ratio field */
    .ratio-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ratio-wrap .prefix {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }

    .ratio-wrap input {
      flex: 1;
    }

    /* Button */
    .calc-btn {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: #fff;
      font-size: 1.0625rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      touch-action: manipulation;
      user-select: none;
      transition: background 0.15s;
      font-family: inherit;
    }

    .calc-btn:hover { background: #1d4ed8; }
    .calc-btn:active { background: #1e40af; }

    /* Error */
    .error {
      color: var(--error);
      font-size: 0.875rem;
      margin-top: 10px;
      padding: 10px 14px;
      background: #fef2f2;
      border-radius: 8px;
      border: 1px solid #fecaca;
      display: none;
    }

    /* Results */
    .results {
      display: none;
      background: var(--success-bg);
      border: 1.5px solid var(--success-border);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 16px;
    }

    .results.visible { display: block; }

    .results-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .ratio-display {
      font-size: 2rem;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 16px;
    }

    .ratio-display span {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 500;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 14px 0 8px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9375rem;
    }

    .result-row:last-child { border-bottom: none; }

    .result-row .label { color: var(--text); }

    .result-row .value {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--blue);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Antibody Dilution Calculator</h1>
    <p class="subtitle">Calculate volumes for primary antibody staining</p>

    <!-- Mode Selection -->
    <div class="card">
      <div class="card-title">What do you know?</div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="totalRatio">
          Total Volume + Dilution Ratio
          <div class="tab-desc">e.g. I want 1 mL at 1:1000 — how much antibody?</div>
        </button>
        <button class="mode-tab" data-mode="antibodyRatio">
          Antibody Volume + Dilution Ratio
          <div class="tab-desc">e.g. I have 2 µL antibody at 1:500 — what total volume?</div>
        </button>
        <button class="mode-tab" data-mode="totalAntibody">
          Total Volume + Antibody Volume
          <div class="tab-desc">e.g. I used 5 µL in 1 mL — what was my dilution?</div>
        </button>
      </div>
    </div>

    <!-- Inputs -->
    <div class="card">
      <div class="card-title">Inputs</div>

      <!-- Total volume -->
      <div class="field" id="field-total">
        <label>Total Volume (per sample)</label>
        <div class="field-row">
          <input type="number" id="totalVolume" placeholder="e.g. 1" min="0" step="any" />
          <select id="totalUnit">
            <option value="uL">µL</option>
            <option value="mL" selected>mL</option>
            <option value="L">L</option>
          </select>
        </div>
      </div>

      <!-- Antibody volume -->
      <div class="field" id="field-antibody" style="display:none">
        <label>Antibody Volume (per sample)</label>
        <div class="field-row">
          <input type="number" id="antibodyVolume" placeholder="e.g. 1" min="0" step="any" />
          <select id="antibodyUnit">
            <option value="uL" selected>µL</option>
            <option value="mL">mL</option>
            <option value="L">L</option>
          </select>
        </div>
      </div>

      <!-- Dilution ratio -->
      <div class="field" id="field-ratio">
        <label>Dilution Ratio (1 : X)</label>
        <div class="ratio-wrap">
          <span class="prefix">1 :</span>
          <input type="number" id="dilutionRatio" placeholder="e.g. 1000" min="1" step="any" />
        </div>
      </div>

      <!-- Number of samples -->
      <div class="field">
        <label>Number of Samples</label>
        <input type="number" id="numSamples" value="1" min="1" step="1" style="max-width:120px" />
      </div>

      <button class="calc-btn" id="calcBtn" type="button" ontouchend="handleTouch(event)">Calculate</button>
      <div class="error" id="errorMsg"></div>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <div class="results-title">Results</div>
      <div class="ratio-display" id="ratioDisplay"></div>
      <div id="resultsBody"></div>
    </div>
  </div>

  <script>
    // ── Unit conversion ──────────────────────────────────────────────────────
    function toUL(val, unit) {
      if (unit === 'mL') return val * 1000;
      if (unit === 'L')  return val * 1000000;
      return val;
    }

    function formatVol(ul) {
      if (ul >= 1000000) return fmt(ul / 1000000) + ' L';
      if (ul >= 1000)    return fmt(ul / 1000) + ' mL';
      return fmt(ul) + ' µL';
    }

    function fmt(n) {
      // Up to 4 significant figures, strip trailing zeros
      return parseFloat(n.toPrecision(4)).toString();
    }

    // ── Mode switching ────────────────────────────────────────────────────────
    const tabs = document.querySelectorAll('.mode-tab');
    let currentMode = 'totalRatio';

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentMode = tab.dataset.mode;
        updateFields();
        clearResults();
      });
    });

    function updateFields() {
      const showTotal    = currentMode === 'totalRatio'    || currentMode === 'totalAntibody';
      const showAntibody = currentMode === 'antibodyRatio' || currentMode === 'totalAntibody';
      const showRatio    = currentMode === 'totalRatio'    || currentMode === 'antibodyRatio';

      document.getElementById('field-total').style.display    = showTotal    ? '' : 'none';
      document.getElementById('field-antibody').style.display = showAntibody ? '' : 'none';
      document.getElementById('field-ratio').style.display    = showRatio    ? '' : 'none';
    }

    // ── Calculate ─────────────────────────────────────────────────────────────
    document.getElementById('calcBtn').addEventListener('click', function(e) {
      e.preventDefault();
      document.activeElement.blur(); // dismiss keyboard first
      setTimeout(calculate, 50);    // slight delay so iOS repaints after keyboard closes
    });

    // Touch handler for iOS — ontouchend fires even when keyboard is open
    function handleTouch(e) {
      e.preventDefault();
      document.activeElement.blur();
      setTimeout(calculate, 50);
    }

    // Allow Enter key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.activeElement.blur();
        setTimeout(calculate, 50);
      }
    });

    // Safe number getter — handles iOS quirks with number inputs
    function getNum(id) {
      var el = document.getElementById(id);
      if (!el) return NaN;
      var v = el.value;
      if (v === '' || v === undefined || v === null) return NaN;
      return Number(v);
    }

    function calculate() {
      clearResults();

      var samples = parseInt(document.getElementById('numSamples').value, 10);
      if (isNaN(samples) || samples < 1) samples = 1;

      var abPerSample, totalPerSample, diluentPerSample, ratio;

      if (currentMode === 'totalRatio') {
        var tv  = getNum('totalVolume');
        var dr  = getNum('dilutionRatio');
        var tvu = document.getElementById('totalUnit').value;
        if (isNaN(tv) || tv <= 0) return showError('Enter a valid total volume.');
        if (isNaN(dr) || dr <= 0) return showError('Enter a valid dilution ratio.');
        totalPerSample   = toUL(tv, tvu);
        ratio            = dr;
        abPerSample      = totalPerSample / ratio;
        diluentPerSample = totalPerSample - abPerSample;

      } else if (currentMode === 'antibodyRatio') {
        var av  = getNum('antibodyVolume');
        var dr2 = getNum('dilutionRatio');
        var avu = document.getElementById('antibodyUnit').value;
        if (isNaN(av) || av <= 0) return showError('Enter a valid antibody volume.');
        if (isNaN(dr2) || dr2 <= 0) return showError('Enter a valid dilution ratio.');
        abPerSample      = toUL(av, avu);
        ratio            = dr2;
        totalPerSample   = abPerSample * ratio;
        diluentPerSample = totalPerSample - abPerSample;

      } else { // totalAntibody
        var tv2 = getNum('totalVolume');
        var av2 = getNum('antibodyVolume');
        var tvu2 = document.getElementById('totalUnit').value;
        var avu2 = document.getElementById('antibodyUnit').value;
        if (isNaN(tv2) || tv2 <= 0) return showError('Enter a valid total volume.');
        if (isNaN(av2) || av2 <= 0) return showError('Enter a valid antibody volume.');
        totalPerSample   = toUL(tv2, tvu2);
        abPerSample      = toUL(av2, avu2);
        if (abPerSample >= totalPerSample) return showError('Antibody volume must be less than total volume.');
        ratio            = totalPerSample / abPerSample;
        diluentPerSample = totalPerSample - abPerSample;
      }

      showResults({
        ratio,
        samples,
        abPerSample,
        diluentPerSample,
        totalPerSample,
        abTotal:      abPerSample      * samples,
        diluentTotal: diluentPerSample * samples,
        totalTotal:   totalPerSample   * samples,
      });
    }

    function showResults(r) {
      document.getElementById('ratioDisplay').innerHTML =
        `<span>Dilution ratio</span><br>1 : ${fmt(r.ratio)}`;

      let html = '';

      if (r.samples > 1) {
        html += `<div class="section-label">Per Sample</div>`;
        html += row('Antibody',        r.abPerSample);
        html += row('Diluent / Buffer', r.diluentPerSample);
        html += row('Total',           r.totalPerSample);
        html += `<div class="divider"></div>`;
        html += `<div class="section-label">All ${r.samples} Samples Combined</div>`;
        html += row('Antibody',        r.abTotal);
        html += row('Diluent / Buffer', r.diluentTotal);
        html += row('Total',           r.totalTotal);
      } else {
        html += row('Antibody Volume',        r.abPerSample);
        html += row('Diluent / Buffer Volume', r.diluentPerSample);
        html += row('Total Volume',           r.totalPerSample);
      }

      document.getElementById('resultsBody').innerHTML = html;
      var resultsEl = document.getElementById('results');
      resultsEl.classList.add('visible');
      // Delay scroll so iOS has time to reflow after keyboard dismissal
      setTimeout(function() {
        resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    function row(label, ul) {
      return `<div class="result-row">
        <span class="label">${label}</span>
        <span class="value">${formatVol(ul)}</span>
      </div>`;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function clearResults() {
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('results').classList.remove('visible');
    }
  </script>
</body>
</html>
